include ./theme.conf

font_family Liga SFMono Nerd Font
bold_font Liga SFMono Nerd Font Bold
bold_italic_font Liga SFMono Nerd Font Bold Italic
# Nerd Fonts v3.3.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

font_size 18.0
hide_window_decorations yes
background_opacity 0.95
enable_audio_bell yes
window_padding_width 10


# BEGIN_KITTY_THEME
# Jellybeans
include current-theme.conf
# END_KITTY_THEME

# My custom theme colors
cursor #6f8396
selection_background #6f8396
active_tab_background #6f8396
color2 #6f8396
# color2 #94b978
color6 #6f8396
color4 #96bddb
