# See https://wiki.hypr.land/Configuring/Keywords/
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more


# Basic
bind = ALT, W, killactive,
bind = SUPER ALT, M, exit,
bind = SUPER, V, togglefloating,
bind = SUPER, J, togglesplit, # dwindle
bind = SUPER, F, fullscreen, 0
bind = CTRL SHIFT, SLASH, exec, hyprpicker -a
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh

# Terminal fix
# bind = CTRL SHIFT, C, pass, class kitty
# bind = CTRL SHIFT, V, pass, class kitty

# Disable middle click paste
bind = , mouse:274, exec, wl-copy -pc

# OBS recording hotkeys
bind = CTRL ALT SHIFT, BACKSPACE, exec, node ~/Programs/obs-hotkeys/toggle-record.js
bind = CTRL ALT, BACKSPACE, exec, node ~/Programs/obs-hotkeys/toggle-pause.js

# Minecraft mcsr locator
bind = , Insert, exec, ~/Projects/fedora-mcsr-locator/get-last-cb-item.sh

# Vicinae
bind = ALT, SPACE, exec, vicinae open
bind = ALT, V, exec, vicinae deeplink vicinae://launch/clipboard/history
bind = CTRL ALT, SPACE, exec, systemctl --user disable --now vicinae.service && systemctl --user enable --now vicinae.service && vicinae open

# Fast apps
bind = SUPER, 1, exec, ~/.config/hypr/scripts/entry-launch.sh kitty
bind = SUPER, 2, exec, ~/.config/hypr/scripts/entry-launch.sh org.gnome.Nautilus
bind = SUPER, 3, exec, XDG_CURRENT_DESKTOP=GNOME ~/.config/hypr/scripts/entry-launch.sh org.gnome.Settings
bind = SUPER, 4, exec, ~/.config/hypr/scripts/entry-launch.sh org.gnome.Software
bind = SUPER, 5, exec, ~/.config/hypr/scripts/entry-launch.sh youtube-music
bind = SUPER, 6, exec, ~/.config/hypr/scripts/entry-launch.sh org.signal.Signal
bind = SUPER, 7, exec, ~/.config/hypr/scripts/entry-launch.sh org.telegram.desktop
bind = SUPER, 8, exec, ~/.config/hypr/scripts/entry-launch.sh app.zen_browser.zen
bind = SUPER, 9, exec, ~/.config/hypr/scripts/entry-launch.sh cursor
bind = SUPER, 0, exec, ~/.config/hypr/scripts/entry-launch.sh md.obsidian.Obsidian

bind = SUPER CTRL, 1, exec, ~/.config/hypr/scripts/entry-launch.sh --new kitty
bind = SUPER CTRL, 2, exec, ~/.config/hypr/scripts/entry-launch.sh --new org.gnome.Nautilus
bind = SUPER CTRL, 3, exec, XDG_CURRENT_DESKTOP=GNOME ~/.config/hypr/scripts/entry-launch.sh --new org.gnome.Settings
bind = SUPER CTRL, 4, exec, ~/.config/hypr/scripts/entry-launch.sh --new org.gnome.Software
bind = SUPER CTRL, 5, exec, ~/.config/hypr/scripts/entry-launch.sh --new youtube-music
bind = SUPER CTRL, 6, exec, ~/.config/hypr/scripts/entry-launch.sh --new org.signal.Signal
bind = SUPER CTRL, 7, exec, ~/.config/hypr/scripts/entry-launch.sh --new org.telegram.desktop
bind = SUPER CTRL, 8, exec, ~/.config/hypr/scripts/entry-launch.sh --new app.zen_browser.zen
bind = SUPER CTRL, 9, exec, ~/.config/hypr/scripts/entry-launch.sh --new cursor
bind = SUPER CTRL, 0, exec, ~/.config/hypr/scripts/entry-launch.sh --new md.obsidian.Obsidian

# Move focus with arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Switch workspaces with letters
bind = SUPER ALT, k, workspace, 1
bind = SUPER ALT, l, workspace, 2
bind = SUPER ALT, semicolon, workspace, 3
bind = SUPER ALT, apostrophe, workspace, 4

# Move active window to a workspace
bind = SUPER SHIFT, k, movetoworkspace, 1
bind = SUPER SHIFT, l, movetoworkspace, 2
bind = SUPER SHIFT, semicolon, movetoworkspace, 3
bind = SUPER SHIFT, apostrophe, movetoworkspace, 4

# Scroll through existing workspaces with arrows
bind = SUPER ALT, right, workspace, e+1
bind = SUPER ALT, left, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 7%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 7%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous