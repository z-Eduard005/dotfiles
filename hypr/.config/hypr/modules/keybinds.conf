# See https://wiki.hypr.land/Configuring/Keywords/
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

source = ~/.config/hypr/modules/fast-apps.conf

# Basic
bind = ALT, W, killactive,
bind = SUPER, V, togglefloating,
bind = SUPER, F, fullscreen, 0
bind = CTRL SUPER, F, fullscreen, 1
bind = CTRL SHIFT, SLASH, exec, hyprpicker -a
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bind = SUPER, S, exec, swaync-client -t -sw

# Terminal fix
# bind = CTRL SHIFT, C, pass, class kitty
# bind = CTRL SHIFT, V, pass, class kitty

# Disable middle click paste
bind = , mouse:274, exec, wl-copy -pc

# OBS recording hotkeys
bind = CTRL ALT SHIFT, BACKSPACE, exec, node ~/Programs/obs-hotkeys/toggle-record.js
bind = CTRL ALT, BACKSPACE, exec, node ~/Programs/obs-hotkeys/toggle-pause.js

# Minecraft mcsr locator
bind = , Insert, exec, ~/Projects/fedora-mcsr-locator/get-last-cb-item.sh

# Vicinae
bind = ALT, SPACE, exec, vicinae open
bind = ALT, V, exec, vicinae deeplink vicinae://launch/clipboard/history
bind = CTRL ALT, SPACE, exec, systemctl --user disable --now vicinae.service && systemctl --user enable --now vicinae.service && vicinae open

# Move focus with arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Switch workspaces with letters
bind = SUPER ALT, h, workspace, 1
bind = SUPER ALT, j, workspace, 2
bind = SUPER ALT, k, workspace, 3
bind = SUPER ALT, l, workspace, 4
bind = SUPER ALT, semicolon, workspace, 5
bind = SUPER ALT, apostrophe, workspace, 6

# Move active window to a workspace
bind = SUPER SHIFT, h, movetoworkspace, 1
bind = SUPER SHIFT, j, movetoworkspace, 2
bind = SUPER SHIFT, k, movetoworkspace, 3
bind = SUPER SHIFT, l, movetoworkspace, 4
bind = SUPER SHIFT, semicolon, movetoworkspace, 5
bind = SUPER SHIFT, apostrophe, movetoworkspace, 6

# Scroll through existing workspaces with arrows
bind = SUPER ALT, right, workspace, e+1
bind = SUPER ALT, left, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 7%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 7%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous